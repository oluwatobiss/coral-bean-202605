name: gmail
version: "1.0.0"
dsl_version: 3
backend: http
description: >-
  Query emails from Gmail.

# Define the inputs Coral should prompt for during setup
inputs:
  GMAIL_ACCESS_TOKEN:
    kind: secret
    hint: "OAuth Access Token for the Gmail API"

base_url: "https://gmail.googleapis.com"

# Use HeaderAuth to template the token into the request
auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: "Bearer {{input.GMAIL_ACCESS_TOKEN}}"

# Tables must be an array (list)
tables:
  - name: emails
    description: "Fetches user emails from Gmail"

    filters:
      - name: id
        type: Utf8
        mode: equality

    detail_hints:
      - table: message
        search_result_column: id
        detail_filter: id
        purpose: "Fetch full message including snippet"

    request:
      # Embed the maxResults and pushdown query directly in the URL
      # format=full returns complete message including snippet, headers, payload
      path: "/gmail/v1/users/me/messages?maxResults=100&format=full"
      method: GET

    response:
      rows_path:
        - messages

    # Use 'Utf8' instead of 'string' for DataFusion compatibility
    columns:
      - name: id
        type: Utf8
        description: "The unique ID of the message."
      - name: threadId
        type: Utf8
        description: "The ID of the thread the message belongs to."
      - name: snippet
        type: Utf8
        description: "A short part of the message text."

  - name: message
    description: "Fetches a single message from Gmail"
    filters:
      - name: id
        type: Utf8
        mode: equality
    request:
      path: "/gmail/v1/users/me/messages/{{filter.id}}?format=full"
      method: GET
    columns:
      - name: id
        type: Utf8
      - name: snippet
        type: Utf8
      - name: payload
        type: Utf8
